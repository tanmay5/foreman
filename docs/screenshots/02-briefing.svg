<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 540" font-family="ui-monospace, 'SF Mono', Menlo, Monaco, monospace">
  <rect width="820" height="540" rx="10" fill="#0d1117"/>

  <!-- title bar -->
  <rect width="820" height="34" rx="10" fill="#161b22"/>
  <rect y="24" width="820" height="10" fill="#161b22"/>
  <circle cx="20" cy="17" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="17" r="6" fill="#ffbd2e"/>
  <circle cx="64" cy="17" r="6" fill="#27c93f"/>
  <text x="410" y="22" text-anchor="middle" font-size="12" fill="#6B7280">foreman briefing</text>

  <!-- aria panel -->
  <rect x="24" y="56" width="772" height="200" rx="8" fill="none" stroke="#10B981" stroke-width="1.5"/>

  <!-- aria title bar -->
  <text x="44" y="84" font-size="14" font-weight="bold" fill="#10B981">Aria</text>
  <text x="84" y="84" font-size="13" fill="#6B7280">·  BRIEFING</text>

  <!-- briefing text -->
  <text x="44" y="118" font-size="13" fill="#c9d1d9">octocat, you have 2 PRs awaiting your review. The most urgent is #312 —</text>
  <text x="44" y="140" font-size="13" fill="#c9d1d9">@maria is blocked on this for the auth migration and it's been 2 days,</text>
  <text x="44" y="162" font-size="13" fill="#c9d1d9">which is past your usual same-day cadence on her PRs. After that, #305</text>
  <text x="44" y="184" font-size="13" fill="#c9d1d9">is straightforward — single-file change, low risk. Your own PR #87 is</text>
  <text x="44" y="206" font-size="13" fill="#c9d1d9">drifting at 12 days, but nothing is blocked on it.</text>
  <text x="44" y="234" font-size="13" fill="#c9d1d9" font-weight="bold">Start with #312.</text>

  <!-- table title -->
  <text x="24" y="298" font-size="13" font-weight="bold" fill="#EF4444">PRs awaiting your review (2)</text>

  <!-- table header -->
  <text x="24" y="326" font-size="12" fill="#6B7280" font-weight="bold">PR     Repo                      Title                                  Age   By</text>
  <line x1="24" y1="334" x2="796" y2="334" stroke="#6B7280" stroke-width="0.5" opacity="0.5"/>

  <!-- table rows -->
  <text x="24" y="356" font-size="12" fill="#c9d1d9" font-weight="bold">#312</text>
  <text x="80" y="356" font-size="12" fill="#6B7280">acme/widgets</text>
  <text x="240" y="356" font-size="12" fill="#c9d1d9">Migrate auth service to OAuth 2.1</text>
  <text x="568" y="356" font-size="12" fill="#6B7280">2d</text>
  <text x="612" y="356" font-size="12" fill="#6B7280">@maria</text>

  <text x="24" y="378" font-size="12" fill="#c9d1d9" font-weight="bold">#305</text>
  <text x="80" y="378" font-size="12" fill="#6B7280">acme/api</text>
  <text x="240" y="378" font-size="12" fill="#c9d1d9">Fix null pointer in feed response</text>
  <text x="568" y="378" font-size="12" fill="#6B7280">4d</text>
  <text x="612" y="378" font-size="12" fill="#6B7280">@kyle</text>

  <!-- own prs -->
  <text x="24" y="430" font-size="13" font-weight="bold" fill="#10B981">Your open PRs (1)</text>

  <text x="24" y="458" font-size="12" fill="#6B7280" font-weight="bold">PR     Repo                      Title                                  Age</text>
  <line x1="24" y1="466" x2="796" y2="466" stroke="#6B7280" stroke-width="0.5" opacity="0.5"/>

  <text x="24" y="488" font-size="12" fill="#c9d1d9" font-weight="bold">#87</text>
  <text x="80" y="488" font-size="12" fill="#6B7280">octocat/scratch</text>
  <text x="240" y="488" font-size="12" fill="#c9d1d9">Optimize ingestion buffer pool</text>
  <text x="568" y="488" font-size="12" fill="#6B7280">12d</text>
</svg>
