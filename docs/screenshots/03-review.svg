  <text x="44" y="380" font-size="13" font-weight="bold" fill="#10B981">Looks good:</text>
  <text x="44" y="402" font-size="12" fill="#c9d1d9">- Test coverage for the happy path is thorough.</text>

  <text x="44" y="436" font-size="13" font-weight="bold" fill="#EF4444">Verdict: Request changes</text>
  <text x="44" y="456" font-size="12" fill="#6B7280">Fix the identity-provider fallback and add a backfill before merge.</text>
