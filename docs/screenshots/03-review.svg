  <text x="84" y="134" font-size="13" fill="#6B7280">·  PR REVIEW</text>

  <text x="44" y="166" font-size="13" font-weight="bold" fill="#c9d1d9">PR #312 — Migrate auth service to OAuth 2.1</text>
  <text x="44" y="186" font-size="12" fill="#6B7280">by @maria  ·  +287 -43  ·  8 files changed</text>

  <text x="44" y="220" font-size="13" font-weight="bold" fill="#c9d1d9">Issues found:</text>

  <text x="44" y="246" font-size="12" fill="#c9d1d9">- auth/oauth_handler.py:42 — token refresh threshold hardcoded to 5 min;</text>
  <text x="60" y="262" font-size="12" fill="#6B7280">should be a feature flag for staged rollout.</text>

  <text x="44" y="288" font-size="12" fill="#c9d1d9">- auth/oauth_handler.py:89 — no fallback when identity provider times out.</text>
  <text x="60" y="304" font-size="12" fill="#6B7280">Will surface 500 to client instead of cached token.</text>

